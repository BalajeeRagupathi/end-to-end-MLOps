<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - Lead2Customer</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#e0f7ff,#dfffe7);
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
            position:fixed;
            top:20px;
            left:20px;
            width:260px;
            height:calc(100vh - 40px);
            padding:30px;
            border-radius:30px;

            /* MATCH NAVBAR COLOR */
            background: #14b8a6;   /* solid teal */
            box-shadow:0 20px 60px rgba(0,0,0,0.25);
        }

        /* LOGO */
        .logo{
            font-size:22px;
            font-weight:700;
            margin-bottom:40px;
            color:black;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .logo i{
            font-size:24px;
            color:#ff3b3b;
            text-shadow:0 0 10px #ff3b3b;
        }

        /* NAV LINKS */
        .nav-links{
            list-style:none;
        }

        .nav-links li{
            margin-bottom:18px;
        }

        .nav-links a{
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px 18px;
            border-radius:30px;
            text-decoration:none;
            color:black;
            font-weight:500;
            transition:0.3s;
        }

        .nav-links a i{
            font-size:18px;
        }

        .nav-links a:hover{
            background:white;
            transform:translateX(6px);
            box-shadow:0 0 12px #00eaff;
        }

        .nav-links a.active{
            background:linear-gradient(90deg,#ffcc00,#ff3b3b);
            color:black;
            box-shadow:0 0 12px #ff3b3b;
        }

        /* ================= TOPBAR ================= */

        .topbar{
            margin-left:300px;
            margin-top:20px;
            margin-right:20px;
            padding:20px 30px;
            border-radius:30px;

            background: #14b8a6;   /* solid teal */
            color:black;

            display:flex;
            justify-content:space-between;
            align-items:center;

            box-shadow:0 10px 40px rgba(0,0,0,0.2);
        }

        .topbar h3{
            font-weight:700;
        }

        /* ================= MAIN ================= */

        .main{
            margin-left:300px;
            padding:40px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:30px;
        }

        /* ================= CARDS ================= */

        .card{
            background:white;
            padding:35px;
            border-radius:25px;
            text-align:center;
            position:relative;

            border:2px solid transparent;
            background-clip:padding-box;

            box-shadow:0 20px 50px rgba(0,0,0,0.1);
            transition:0.35s;
        }
/* CARD */
.card{
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    position:relative;

    box-shadow:0 20px 50px rgba(0,0,0,0.1);
    transition:0.35s;
}

/* GLOW BORDER FIXED */
.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:25px;
    padding:2px;
    background:linear-gradient(90deg,#00eaff,#00ff88,#ffcc00);

    -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;

    pointer-events:none; /* 🔥 IMPORTANT FIX */
}

.card:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 30px 70px rgba(0,0,0,0.2);
}

/* ICON */
.card i{
    font-size:40px;
    margin-bottom:15px;
    color:#00eaff;
    text-shadow:0 0 12px #00eaff;
}

/* TEXT */
.card h2{
    margin-bottom:10px;
}

.card p{
    color:#555;
    margin-bottom:20px;
}

/* BUTTON (ANCHOR STYLE) */
.btn{
    display:inline-block;
    text-decoration:none;
    padding:10px 25px;
    border-radius:25px;
    font-weight:600;
    transition:0.3s;
}

/* BUTTON COLOR */
.btn-blue{
    background:linear-gradient(90deg,#00eaff,#00ff88);
    color:black;
}

/* HOVER */
.btn:hover{
    transform:scale(1.08);
    box-shadow:0 0 15px #00eaff;
}

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <i class="fas fa-bolt"></i> Lead2Customer
    </div>

    <ul class="nav-links">

        <li>
            <a href="#" class="active">
                <i class="fas fa-home"></i> Dashboard
            </a>
        </li>

        <li>
            <a href="/view_users">
                <i class="fas fa-users"></i> View Users
            </a>
        </li>

        <li>
            <a href="/process1">
                <i class="fas fa-brain"></i> Train Model
            </a>
        </li>

        <li>
            <a href="/logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </li>

    </ul>

</div>

<!-- TOPBAR -->
<div class="topbar">

    <h3><i class="fas fa-chart-line"></i> Admin Dashboard</h3>

    <span><i class="fas fa-robot"></i> AI Control Panel</span>

</div>

<!-- MAIN -->
<div class="main">

    <div class="grid">

<!-- USERS -->
<div class="card">
    <i class="fas fa-users"></i>
    <h2>Users</h2>
    <p>Manage all registered users</p>
    
    <a href="/view_users" class="btn btn-blue">Open</a>
</div>

<!-- MODEL -->
<div class="card">
    <i class="fas fa-brain"></i>
    <h2>Train Model</h2>
    <p>Run ML pipeline & predictions</p>
    
    <a href="/process1" class="btn btn-blue">Start</a>
</div>


    </div>

</div>

</body>
</html>
