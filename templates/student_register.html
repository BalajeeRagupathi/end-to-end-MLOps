<!DOCTYPE html>
<html>
<head>
    <title>Student Register - Lead2Customer</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: url('../static/bg2.png') no-repeat center center/cover;
            color: #fff;
        }

        /* NAVBAR SAME */
        .navbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-radius: 50px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(14px);
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
        }

        .logo span {
            background: linear-gradient(90deg,#00eaff,#00ff88,#ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            margin: 0 10px;
            text-decoration: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
        }

        .nav-links a:hover {
            background: linear-gradient(90deg,#00eaff,#00ff88);
            color: black;
        }

        /* ACTIVE */
        .nav-links a.active {
            background: linear-gradient(90deg,#00eaff,#00ff88);
            color: black;
            font-weight: bold;
        }

        /* MAIN */
        .hero {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: space-between;
            padding: 0 100px;
        }

        .left {
            max-width: 550px;
        }

        .title {
            font-size: 60px;
            font-weight: 700;
        }

        .title span {
            background: linear-gradient(90deg,#00eaff,#00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            margin-top: 20px;
            line-height: 1.7;
            font-size: 15px;
        }

        /* REGISTER BOX */
        .login-box {
            width: 500px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            margin-top: 50px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff88;
        }

        label {
            font-size: 13px;
            color: #ddd;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input::placeholder {
            color: #ccc;
        }

        input:focus {
            border: 1px solid #00eaff;
            box-shadow: 0 0 10px #00eaff;
        }

        /* TWO COLUMN GRID */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full {
            grid-column: span 2;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(90deg,#00eaff,#00ff88);
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00eaff;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        Lead<span>2Customer</span>
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin">Admin</a>
        <a href="/student_login" class="active">Student</a>
        <a href="/manager_login">Manager</a>
        <a href="/telecaller_login">Telecaller</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">

    <!-- LEFT -->
    <div class="left">
        <div class="title">
            Student <span>Register</span>
        </div>

        <div class="desc">
            Create your account to start managing leads, tracking performance, 
            and accessing your personalized dashboard.
        </div>
    </div>

    <!-- RIGHT -->
    <div class="login-box">

        <h2>Create Account</h2>

        <form method="POST">

            <div class="form-grid">

                <div>
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Enter full name" required>
                </div>

                <div>
                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter email" required>
                </div>

                <div>
                    <label>Mobile</label>
                    <input type="text" name="mobile" placeholder="Enter mobile" required>
                </div>

                <div>
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Choose username" required>
                </div>

                <div class="full">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create password" required>
                </div>

                <div class="full">
                    <button type="submit">Register</button>
                </div>

            </div>

            <!-- LOGIN LINK -->
            <p style="text-align:center; margin-top:15px; font-size:13px;">
                Already have an account? 
                <a href="/student_login" style="color:#00ff88; text-decoration:none; font-weight:bold;">
                    Login here
                </a>
            </p>

        </form>

    </div>

</div>

</body>
</html>
