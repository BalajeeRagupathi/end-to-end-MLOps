<!DOCTYPE html>
<html>
<head>
    <title>Add Telecaller - Lead2Customer</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#e0f7ff,#dfffe7);
        }

        /* SIDEBAR */

        .sidebar{
            position:fixed;
            top:20px;
            left:20px;
            width:260px;
            height:calc(100vh - 40px);
            padding:30px;
            border-radius:30px;
            background:#14b8a6;
        }

        .logo{
            font-size:22px;
            font-weight:700;
            margin-bottom:40px;
            display:flex;
            gap:10px;
        }

        .nav-links{
            list-style:none;
        }

        .nav-links li{
            margin-bottom:18px;
        }

        .nav-links a{
            display:flex;
            gap:12px;
            padding:12px;
            border-radius:30px;
            text-decoration:none;
            color:black;
        }

        .nav-links a:hover{
            background:white;
        }

        .nav-links a.active{
            background:linear-gradient(90deg,#ffcc00,#ff3b3b);
        }

        /* TOPBAR */

        .topbar{
            margin-left:300px;
            margin-top:20px;
            margin-right:20px;
            padding:20px;
            border-radius:30px;
            background:#14b8a6;
            display:flex;
            justify-content:space-between;
        }

        /* MAIN */

        .main{
            margin-left:300px;
            padding:40px;
        }

        /* FORM CARD */

        .form-card{
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 20px 50px rgba(0,0,0,0.1);
        }

        .form-card h2{
            text-align:center;
            margin-bottom:30px;
        }

        /* TWO COLUMN FORM */

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            margin-bottom:6px;
            font-weight:500;
        }

        input, select{
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
            outline:none;
            transition:0.3s;
        }

        input:focus, select:focus{
            border-color:#00eaff;
            box-shadow:0 0 8px #00eaff;
        }

        /* FULL WIDTH BUTTON */

        .full{
            grid-column:span 2;
            text-align:center;
        }

        button{
            padding:12px 30px;
            border:none;
            border-radius:25px;
            background:linear-gradient(90deg,#00eaff,#00ff88);
            font-weight:600;
            cursor:pointer;
        }

        button:hover{
            transform:scale(1.05);
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <i class="fas fa-bolt"></i> Lead2Customer
    </div>

    <ul class="nav-links">

        <li>
            <a href="/manager_dashboard">
                <i class="fas fa-home"></i> Dashboard
            </a>
        </li>

        <li>
            <a href="/add_telecaller" class="active">
                <i class="fas fa-user-plus"></i> Add Telecaller
            </a>
        </li>

        <li>
            <a href="/upload_data">
                <i class="fas fa-upload"></i> Upload Leads
            </a>
        </li>

        <li>
            <a href="/manager_lead_status">
                <i class="fas fa-chart-line"></i> View Status
            </a>
        </li>

        <li>
            <a href="/logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </li>

    </ul>

</div>

<!-- TOPBAR -->
<div class="topbar">
    <h3><i class="fas fa-user-plus"></i> Add Telecaller</h3>
    <span>Manager Panel</span>
</div>

<!-- MAIN -->
<div class="main">

    <div class="form-card">

        <h2>Add Telecaller</h2>

        <form method="post">

            <div class="form-grid">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter email address" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" name="mobile" placeholder="Enter mobile number" required>
                </div>

                <div class="form-group">
                    <label>Working Type</label>
                    <select name="working_type" required>
                        <option value="">Select type</option>
                        <option>Full-Time</option>
                        <option>Part-Time</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Working Time</label>
                    <input type="text" name="working_time" placeholder="Eg: 9AM - 6PM" required>
                </div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Create username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create password" required>
                </div>

                <div class="form-group full">
                    <button type="submit">Add Telecaller</button>
                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
