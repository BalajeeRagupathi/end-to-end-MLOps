<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#e0f7ff,#dfffe7);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:20px;
    left:20px;
    width:260px;
    height:calc(100vh - 40px);
    padding:30px;
    border-radius:30px;
    background:#14b8a6;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.logo{
    font-size:22px;
    font-weight:700;
    margin-bottom:40px;
    display:flex;
    align-items:center;
    gap:10px;
}

.logo i{
    color:#ff3b3b;
}

/* NAV */
.nav-links{
    list-style:none;
}

.nav-links li{
    margin-bottom:18px;
}

.nav-links a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 18px;
    border-radius:30px;
    text-decoration:none;
    color:black;
    transition:0.3s;
}

.nav-links a:hover{
    background:white;
    transform:translateX(6px);
}

.nav-links a.active{
    background:linear-gradient(90deg,#ffcc00,#ff3b3b);
}

/* TOPBAR */
.topbar{
    margin-left:300px;
    margin-top:20px;
    margin-right:20px;
    padding:20px 30px;
    border-radius:30px;
    background:#14b8a6;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* MAIN */
.main{
    margin-left:300px;
    padding:40px;
}

/* STATS GRID */
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.stat-card{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.stat-card h3{
    font-size:22px;
    color:#14b8a6;
}

.stat-card p{
    font-size:14px;
    color:#666;
}

/* MAIN CARDS */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
}

.card{
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card i{
    font-size:40px;
    margin-bottom:15px;
    color:#00eaff;
}

.btn{
    display:inline-block;
    padding:10px 25px;
    border-radius:25px;
    text-decoration:none;
    background:linear-gradient(90deg,#00eaff,#00ff88);
    color:black;
    font-weight:600;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <i class="fas fa-user-graduate"></i> Student Panel
    </div>

    <ul class="nav-links">
        <li><a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="/book_course"><i class="fas fa-book"></i> Book Course</a></li>
        <li><a href="#"><i class="fas fa-user-circle"></i> My Courses</a></li>
        <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>

</div>

<!-- TOPBAR -->
<div class="topbar">
    <h3><i class="fas fa-user"></i> Student Dashboard</h3>
    <span>Welcome {{session['student']}}</span>
</div>

<!-- MAIN -->
<div class="main">

    <!-- STATS -->
    <div class="stats">

        <div class="stat-card">
            <h3>3</h3>
            <p>Courses Viewed</p>
        </div>

        <div class="stat-card">
            <h3>1</h3>
            <p>Booked</p>
        </div>

        <div class="stat-card">
            <h3>75%</h3>
            <p>Engagement</p>
        </div>

        <div class="stat-card">
            <h3>High</h3>
            <p>Lead Score</p>
        </div>

    </div>

    <!-- MAIN CARDS -->
    <div class="grid">

        <!-- BOOK COURSE -->
        <div class="card">
            <i class="fas fa-book-open"></i>
            <h2>Book Course</h2>
            <p>Enroll in your favorite course</p>
            <a href="/book_course" class="btn">Start</a>
        </div>

        <!-- PROFILE -->
        <div class="card">
            <i class="fas fa-user-circle"></i>
            <h2>My Profile</h2>
            <p>View & update your details</p>
            <a href="#" class="btn">Open</a>
        </div>

    </div>

</div>

</body>
</html>
