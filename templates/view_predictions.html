{% extends 'base.html' %}
{% block content %}

<div class="card">
    <h2>Prediction Results</h2>

    <div class="table-container">
        <table>
            <tr>
                {% for col in columns %}
                <th>{{ col }}</th>
                {% endfor %}
            </tr>

            {% for row in data %}
            <tr>
                {% for item in row %}
                <td>{{ item }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </table>
    </div>

</div>

{% endblock %}
