<!DOCTYPE html>
<html>
<head>
    <title>Book Course</title>

    <!-- Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#e0f7ff,#dfffe7);
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:20px;
    left:20px;
    width:260px;
    height:calc(100vh - 40px);
    padding:30px;
    border-radius:30px;
    background:#14b8a6;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

.logo{
    font-size:22px;
    font-weight:700;
    margin-bottom:40px;
}

/* NAV */
.nav-links{
    list-style:none;
}

.nav-links li{
    margin-bottom:18px;
}

.nav-links a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 18px;
    border-radius:30px;
    text-decoration:none;
    color:black;
    transition:0.3s;
}

.nav-links a:hover{
    background:white;
    transform:translateX(6px);
}

.nav-links a.active{
    background:linear-gradient(90deg,#ffcc00,#ff3b3b);
}

/* TOPBAR */
.topbar{
    margin-left:300px;
    margin-top:20px;
    margin-right:20px;
    padding:20px 30px;
    border-radius:30px;
    background:#14b8a6;
    display:flex;
    justify-content:space-between;
}

/* MAIN */
.main{
    margin-left:300px;
    padding:40px;
}

/* FORM CARD */
.form-card{
    background:white;
    padding:30px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

/* GRID (3 COLUMN) */
.form-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

/* FORM GROUP */
.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:14px;
    font-weight:600;
    margin-bottom:6px;
}

/* INPUT */
input, select{
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
}

/* COLUMN CONTROL */
.col-2{ grid-column: span 2; }
.col-3{ grid-column: span 3; }

/* SECTION TITLE */
.section-title{
    grid-column: span 3;
    font-weight:700;
    margin-top:10px;
    color:#14b8a6;
}

/* BUTTON */
.btn{
    padding:14px;
    border:none;
    border-radius:25px;
    background:linear-gradient(90deg,#00eaff,#00ff88);
    font-weight:600;
    cursor:pointer;
    font-size:16px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <i class="fas fa-user-graduate"></i> Student Panel
    </div>

    <ul class="nav-links">
        <li><a href="/student_dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="#" class="active"><i class="fas fa-book"></i> Book Course</a></li>
        <li><a href="#"><i class="fas fa-history"></i> My Courses</a></li>
        <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>

</div>

<!-- TOPBAR -->
<div class="topbar">
    <h3>📚 Course Booking</h3>
    <span>Welcome {{session['student']}}</span>
</div>

<!-- MAIN -->
<div class="main">

<div class="form-card">

<form method="POST">

<div class="form-grid">

<!-- PERSONAL -->
<div class="section-title">🔹 Personal Information</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="full_name" placeholder="Enter your full name">
</div>

<div class="form-group">
<label>Age</label>
<input type="number" name="age" placeholder="e.g. 22">
</div>

<div class="form-group">
<label>Gender</label>
<select name="gender">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="form-group col-2">
<label>Location</label>
<input type="text" name="location" placeholder="City, State">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" placeholder="example@gmail.com">
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" name="phone" placeholder="9876543210">
</div>

<!-- EDUCATION -->
<div class="section-title">🔹 Education & Work</div>

<div class="form-group">
<label>Education</label>
<select name="education">
<option>UG</option>
<option>PG</option>
</select>
</div>

<div class="form-group">
<label>Occupation</label>
<select name="occupation">
<option>Student</option>
<option>Working</option>
</select>
</div>

<div class="form-group">
<label>Experience</label>
<input type="number" name="experience_years" placeholder="Years">
</div>

<!-- COURSE -->
<div class="section-title">🔹 Course Interest</div>

<div class="form-group">
<label>Course</label>
<select name="course_interest">
<option>Data Science</option>
<option>AI</option>
<option>Web Development</option>
</select>
</div>

<div class="form-group">
<label>Budget</label>
<input type="number" name="budget" placeholder="₹50000">
</div>

<div class="form-group">
<label>Payment Mode</label>
<select name="payment_mode">
<option>EMI</option>
<option>Full</option>
</select>
</div>

<div class="form-group col-2">
<label>Preferred Contact Time</label>
<select name="preferred_time">
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
</select>
</div>

<!-- ENGAGEMENT -->
<div class="section-title">🔹 Engagement</div>

<div class="form-group">
<label>Previous Enquiry</label>
<select name="previous_enquiry">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Demo Attended</label>
<select name="demo_attended">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Webinar Attended</label>
<select name="webinar_attended">
<option>Yes</option>
<option>No</option>
</select>
</div>

<!-- MARKETING -->
<div class="section-title">🔹 Marketing</div>

<div class="form-group">
<label>Source</label>
<select name="source">
<option>Website</option>
<option>Instagram</option>
<option>Facebook</option>
</select>
</div>

<div class="form-group">
<label>Email Opened</label>
<select name="email_opened">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="form-group">
<label>Email Clicked</label>
<select name="email_clicked">
<option>Yes</option>
<option>No</option>
</select>
</div>

<!-- BUTTON -->
<div class="form-group col-3">
<button type="submit" class="btn">🚀 Submit Booking</button>
</div>

<!-- HIDDEN -->
<input type="hidden" name="device_type" id="device_type">
<input type="hidden" name="time_spent" id="time_spent">
<input type="hidden" name="pages_visited" value="5">
<input type="hidden" name="click_count" id="click_count">

</div>

</form>

</div>

</div>

<script>
// Device
document.getElementById("device_type").value =
/Mobi|Android/i.test(navigator.userAgent) ? "Mobile" : "Laptop";

// Time
let start = Date.now();
setInterval(()=>{
document.getElementById("time_spent").value =
Math.floor((Date.now()-start)/1000);
},1000);

// Clicks
let clicks=0;
document.addEventListener("click",()=>{
clicks++;
document.getElementById("click_count").value=clicks;
});
</script>

</body>
</html>
