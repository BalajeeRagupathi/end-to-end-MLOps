<!DOCTYPE html>
<html>
<head>
    <title>Upload Leads - Lead2Customer</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>

        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:linear-gradient(135deg,#e0f7ff,#dfffe7);}

        /* SIDEBAR */
        .sidebar{
            position:fixed;top:20px;left:20px;width:260px;height:calc(100vh - 40px);
            padding:30px;border-radius:30px;background:#14b8a6;
        }

        .logo{font-size:22px;font-weight:700;margin-bottom:40px;display:flex;gap:10px;}

        .nav-links{list-style:none;}
        .nav-links li{margin-bottom:18px;}

        .nav-links a{
            display:flex;gap:12px;padding:12px;border-radius:30px;
            text-decoration:none;color:black;
        }

        .nav-links a:hover{background:white;}
        .nav-links a.active{background:linear-gradient(90deg,#ffcc00,#ff3b3b);}

        /* TOPBAR */
        .topbar{
            margin-left:300px;margin-top:20px;margin-right:20px;
            padding:20px;border-radius:30px;background:#14b8a6;
            display:flex;justify-content:space-between;
        }

        /* MAIN */
        .main{
            margin-left:300px;
            padding:40px;
        }

        /* BIG CONTAINER (LIKE IMAGE) */
        .upload-wrapper{
            background:#f3f4f6;
            border:3px dashed #14b8a6;
            border-radius:25px;
            padding:60px 30px;
            text-align:center;
            max-width:800px;
            margin:auto;
        }

        /* ICON */
        .upload-wrapper i{
            font-size:55px;
            color:#14b8a6;
            margin-bottom:15px;
        }

        /* TITLE */
        .upload-wrapper h2{
            font-size:28px;
            margin-bottom:10px;
        }

        .upload-wrapper p{
            color:#555;
            margin-bottom:20px;
        }

        /* FILE INPUT */
        .file-input{
            margin:15px 0;
        }

        .file-input input{
            padding:8px;
        }

        /* FILE NAME */
        .file-name{
            margin-top:10px;
            font-size:14px;
            color:#333;
        }

        /* BUTTON */
        button{
            margin-top:20px;
            padding:14px 35px;
            border:none;
            border-radius:15px;
            background:#14b8a6;
            color:white;
            font-weight:600;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0d9488;
            transform:scale(1.05);
        }

        /* NOTE */
        .note{
            margin-top:20px;
            color:#555;
            font-size:14px;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <i class="fas fa-bolt"></i> Lead2Customer
    </div>

    <ul class="nav-links">
        <li><a href="/manager_dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
        <li><a href="/add_telecaller"><i class="fas fa-user-plus"></i> Add Telecaller</a></li>
        <li><a href="/upload_data" class="active"><i class="fas fa-upload"></i> Upload Leads</a></li>
        <li><a href="/manager_lead_status"><i class="fas fa-chart-line"></i> View Status</a></li>
        <li><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>

</div>

<!-- TOPBAR -->
<div class="topbar">
    <h3><i class="fas fa-upload"></i> Upload Leads</h3>
    <span>Manager Panel</span>
</div>

<!-- MAIN -->
<div class="main">

<div class="upload-wrapper">

    <i class="fas fa-cloud-upload-alt"></i>

    <h2>Upload Your CSV</h2>
    <p>Drag & drop or select a CSV file</p>

    <form method="post" enctype="multipart/form-data">

        <div class="file-input">
            <input type="file" id="fileInput" name="file" required>
        </div>

        <div id="fileName" class="file-name"></div>

        <button type="submit">Upload & Predict</button>

    </form>


</div>

</div>

<script>
document.getElementById("fileInput").addEventListener("change", function(){
    let fileName = this.files[0]?.name || "";
    document.getElementById("fileName").innerText = fileName ? "Selected: " + fileName : "";
});
</script>

</body>
</html>
